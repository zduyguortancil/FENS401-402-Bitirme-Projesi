<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>THY — Book a Ticket</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#1e293b;--text2:#64748b;--red:#dc2626;--blue:#2563eb;--green:#16a34a;--orange:#d97706}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:#dc2626;color:#fff;padding:0 2rem;height:60px;display:flex;align-items:center;gap:1rem}
.header h1{font-size:1.1rem;font-weight:700;letter-spacing:.02em}
.header .sub{font-size:.78rem;opacity:.8}
.main{max-width:900px;margin:2rem auto;padding:0 1.5rem}
.search-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.search-row{display:flex;gap:1rem;align-items:end;flex-wrap:wrap}
.field{display:flex;flex-direction:column;gap:.3rem}
.field label{font-size:.72rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.field select,.field input{padding:.5rem .8rem;font-size:.85rem;border:1px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;background:#fff}
.field select:focus,.field input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.search-btn{padding:.55rem 1.5rem;font-size:.85rem;font-weight:600;background:var(--red);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.search-btn:hover{background:#b91c1c}
.fares-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem}
.fare-card{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:1.2rem;text-align:center;transition:all .2s;position:relative;overflow:hidden}
.fare-card.closed{opacity:.4;pointer-events:none}
.fare-card.closed::after{content:'CLOSED';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-15deg);font-size:1.2rem;font-weight:800;color:var(--red);opacity:.6;letter-spacing:.1em}
.fare-card:not(.closed):hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.fare-name{font-size:.85rem;font-weight:700;margin-bottom:.3rem}
.fare-price{font-size:1.8rem;font-weight:800;font-family:'JetBrains Mono',monospace;margin-bottom:.5rem}
.fare-features{font-size:.72rem;color:var(--text2);line-height:1.5;margin-bottom:1rem;min-height:40px}
.fare-buy{padding:.5rem 1.2rem;font-size:.82rem;font-weight:600;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;width:100%}
.fare-buy:hover{background:#1d4ed8}
.info-bar{display:flex;gap:1.5rem;align-items:center;flex-wrap:wrap;margin-bottom:1.5rem;padding:1rem;background:var(--card);border:1px solid var(--border);border-radius:12px}
.info-item{display:flex;flex-direction:column;gap:.1rem}
.info-label{font-size:.65rem;text-transform:uppercase;color:var(--text2);font-weight:600;letter-spacing:.05em}
.info-val{font-size:1rem;font-weight:700;font-family:'JetBrains Mono',monospace}
.multipliers{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
.mult-chip{font-size:.68rem;padding:3px 8px;border-radius:20px;font-weight:600;font-family:'JetBrains Mono',monospace}
.mult-up{background:#dcfce7;color:#16a34a}
.mult-down{background:#fef2f2;color:#dc2626}
.mult-neutral{background:#f1f5f9;color:#64748b}
.alert-box{padding:1rem;border-radius:8px;margin-bottom:1rem;font-size:.85rem;display:none}
.alert-box.success{display:block;background:#dcfce7;color:#166534;border:1px solid #86efac}
.alert-box.error{display:block;background:#fef2f2;color:#991b1b;border:1px solid #fca5a5}
.tracking-info{font-size:.65rem;color:var(--text2);text-align:center;margin-top:2rem;padding:1rem;border-top:1px solid var(--border)}
</style>
</head>
<body>
<header class="header">
  <h1>TURKISH AIRLINES</h1>
  <span class="sub">Book a Ticket</span>
</header>

<div class="main">
  <div class="search-card">
    <div class="search-row">
      <div class="field">
        <label>From</label>
        <input type="text" value="IST" disabled style="width:80px;background:#f1f5f9"/>
      </div>
      <div class="field">
        <label>To</label>
        <select id="destSelect" onchange="onRouteChange()">
          <option value="">Select...</option>
        </select>
      </div>
      <div class="field">
        <label>Date</label>
        <select id="dateSelect" onchange="onDateChange()">
          <option value="">Select a route first</option>
        </select>
      </div>
      <div class="field">
        <label>Cabin</label>
        <select id="cabinSelect" onchange="refreshPrices()">
          <option value="economy">Economy</option>
          <option value="business">Business</option>
        </select>
      </div>
      <div class="field">
        <label>Passengers</label>
        <select id="paxSelect" onchange="refreshPrices()">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4+</option>
        </select>
      </div>
      <button class="search-btn" onclick="refreshPrices()">Search Prices</button>
    </div>
  </div>

  <div id="alertBox" class="alert-box"></div>

  <div class="info-bar" id="infoBar" style="display:none">
    <div class="info-item"><span class="info-label">Route</span><span class="info-val" id="infoRoute">--</span></div>
    <div class="info-item"><span class="info-label">Date</span><span class="info-val" id="infoDate">--</span></div>
    <div class="info-item"><span class="info-label">Seats Remaining</span><span class="info-val" id="infoSeats">--</span></div>
    <div class="info-item"><span class="info-label">Load Factor</span><span class="info-val" id="infoLF">--</span></div>
    <div style="flex:1"></div>
    <div class="multipliers" id="multChips"></div>
  </div>

  <div class="fares-grid" id="faresGrid"></div>

  <div class="tracking-info">
    This page is an educational simulation environment. No real ticket sales are made.
  </div>
</div>

<script>
// Session tracking
const SESSION = {
  start_time: Date.now(),
  search_count: 0,
  view_count: 0,
  return_visit: !!localStorage.getItem('booking_visited'),
  device: /Mobi|Android/i.test(navigator.userAgent) ? 'mobile' : 'desktop',
  abandoned_cart: false,
  pax_count: 1,
  ff_tier: 'none',
};
localStorage.setItem('booking_visited', '1');

let currentFlightKey = null;
let priceTimer = null;

// Rotalari yukle
async function loadRoutes(){
  try{
    const res = await fetch('/api/sim/flights');
    const data = await res.json();
    const flights = data.flights || [];
    // Unique destinations
    const dests = new Map();
    flights.forEach(f => {
      const arr = f.route.split('-')[1];
      if (!dests.has(arr)) dests.set(arr, f.route);
    });
    const sel = document.getElementById('destSelect');
    sel.innerHTML = '<option value="">Select...</option>';
    [...dests.entries()].sort((a,b)=>a[0].localeCompare(b[0])).forEach(([code, route]) => {
      sel.innerHTML += `<option value="${route}">${code} (${route})</option>`;
    });
  } catch(e) {
    document.getElementById('destSelect').innerHTML = '<option value="">Simulation not started</option>';
  }
}

async function onRouteChange(){
  const route = document.getElementById('destSelect').value;
  if (!route) return;
  SESSION.search_count++;

  // Get available dates for this route
  try {
    const res = await fetch('/api/sim/flights');
    const data = await res.json();
    const cabin = document.getElementById('cabinSelect').value;
    const dates = (data.flights || [])
      .filter(f => f.route === route && f.cabin === cabin && f.sold < f.capacity)
      .map(f => f.dep_date)
      .filter((v,i,a) => a.indexOf(v) === i)
      .sort();

    const sel = document.getElementById('dateSelect');
    sel.innerHTML = dates.length
      ? dates.slice(0, 30).map(d => `<option value="${d}">${d}</option>`).join('')
      : '<option value="">No available dates</option>';
  } catch(e) {}
}

function onDateChange(){
  SESSION.search_count++;
  refreshPrices();
}

async function refreshPrices(){
  const route = document.getElementById('destSelect').value;
  const date = document.getElementById('dateSelect').value;
  const cabin = document.getElementById('cabinSelect').value;
  SESSION.pax_count = parseInt(document.getElementById('paxSelect').value);

  if (!route || !date) return;

  currentFlightKey = `${route}_${date}_${cabin}`;
  // Try with _0 suffix (first daily flight)
  let flightKey = currentFlightKey + '_0';

  SESSION.view_count++;
  const sessionJson = encodeURIComponent(JSON.stringify({
    time_on_page: Math.round((Date.now() - SESSION.start_time) / 1000),
    search_count: SESSION.search_count,
    view_count: SESSION.view_count,
    return_visit: SESSION.return_visit,
    device: SESSION.device,
    pax_count: SESSION.pax_count,
    ff_tier: SESSION.ff_tier,
    abandoned_cart: SESSION.abandoned_cart,
  }));

  try {
    const res = await fetch(`/api/pricing/quote?flight_key=${encodeURIComponent(flightKey)}&session=${sessionJson}`);
    const q = await res.json();
    if (q.error) {
      document.getElementById('faresGrid').innerHTML = `<div class="alert-box error" style="display:block">${q.error}</div>`;
      return;
    }
    renderQuote(q, flightKey);
  } catch(e) {
    console.error(e);
  }

  // Auto-refresh every 5 seconds
  if (priceTimer) clearInterval(priceTimer);
  priceTimer = setInterval(refreshPrices, 5000);
}

function renderQuote(q, flightKey){
  document.getElementById('infoBar').style.display = 'flex';
  const route = flightKey.split('_').slice(0,2).join(' → ').replace('-',' → ');
  document.getElementById('infoRoute').textContent = route;
  document.getElementById('infoDate').textContent = flightKey.split('_')[2] || '';
  // Seats info from current prices context
  document.getElementById('infoSeats').textContent = q.open_fares?.length ? 'Available' : 'Full';
  document.getElementById('infoLF').textContent = '';

  // Multiplier chips
  const m = q.multipliers || {};
  const chips = document.getElementById('multChips');
  chips.innerHTML = Object.entries(m).filter(([k])=>k!=='combined').map(([k,v]) => {
    const label = {supply:'Supply',demand:'Demand',sentiment:'Sentiment',customer:'Customer'}[k]||k;
    const cls = v > 1.02 ? 'mult-up' : v < 0.98 ? 'mult-down' : 'mult-neutral';
    return `<span class="mult-chip ${cls}">${label}: ${v.toFixed(2)}x</span>`;
  }).join('');

  // Fare cards
  const grid = document.getElementById('faresGrid');
  const fcs = q.fare_classes || {};
  grid.innerHTML = Object.entries(fcs).map(([fcId, fc]) => {
    const isOpen = fc.open;
    const price = fc.price * SESSION.pax_count;
    return `<div class="fare-card${isOpen?'':' closed'}" style="border-top:3px solid ${fc.color}">
      <div class="fare-name" style="color:${fc.color}">${fc.name}</div>
      <div class="fare-price" style="color:${isOpen?'var(--text)':'var(--text2)'}">$${Math.round(price)}</div>
      <div class="fare-features">${fc.features}</div>
      ${isOpen ? `<button class="fare-buy" style="background:${fc.color}" onclick="buyTicket('${flightKey}','${fcId}')">Buy Now</button>` : ''}
    </div>`;
  }).join('');
}

async function buyTicket(flightKey, fareClass){
  SESSION.abandoned_cart = false;
  const sessionData = {
    time_on_page: Math.round((Date.now() - SESSION.start_time) / 1000),
    search_count: SESSION.search_count,
    view_count: SESSION.view_count,
    return_visit: SESSION.return_visit,
    device: SESSION.device,
    pax_count: SESSION.pax_count,
    ff_tier: SESSION.ff_tier,
  };

  try {
    const res = await fetch('/api/pricing/book', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({flight_key: flightKey, fare_class: fareClass, session: sessionData}),
    });
    const result = await res.json();
    const alertBox = document.getElementById('alertBox');
    if (result.success) {
      alertBox.className = 'alert-box success';
      alertBox.innerHTML = `Ticket purchased! <strong>${fareClass} class — $${result.price}</strong>. Seats remaining: ${result.seats_remaining}`;
      refreshPrices();
    } else {
      alertBox.className = 'alert-box error';
      alertBox.textContent = result.error || 'An error occurred';
    }
  } catch(e) {
    console.error(e);
  }
}

// Init
loadRoutes();
setInterval(loadRoutes, 30000);
</script>
</body>
</html>
